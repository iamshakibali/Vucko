<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vucko™ — Creative Agency</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Top Navigation Bar -->
  <header class="top-bar">
    <div class="top-bar__left">
      <a href="#" class="logo">Vucko<sup>™</sup></a>
      <span class="location">Toronto, Canada 6 51 am</span>
    </div>
    <div class="top-bar__right">
      <nav class="nav-links">
        <a href="#">Projects</a>,
        <a href="#">Approach</a>,
        <a href="#">About</a>,
        <a href="#">Contact</a>
      </nav>
      <button class="dark-toggle" aria-label="Toggle dark mode">
        <span class="dark-dot"></span>
      </button>
    </div>
  </header>

  <!-- Hero Section -->
  <main class="hero">
    <!-- Giant VUCKO text with laptop image overlay -->
    <div class="hero__brand">
      <div class="hero__brand-text">
        <span class="hero__vucko">VUCKO</span><span class="hero__tm">™</span>
      </div>
      <div class="hero__laptop-wrapper">
        <img
          src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600&q=80"
          alt="Laptop showing IBM Let's create"
          class="hero__laptop"
        />
      </div>
      <p class="hero__showcase-label">
        Vucko<sup>™</sup> Showcase<br>
        (Clients — 2018/2026)
      </p>
    </div>

    <!-- Tagline and bottom row -->
    <div class="hero__tagline-area">
      <h1 class="hero__tagline">
        Partnering with brands to define,<br>
        structure, and scale motion.
      </h1>
      <div class="hero__bottom-row">
        <a href="#" class="hero__approach-link">Learn more about our approach</a>
        <span class="hero__scroll-hint">(Scroll)</span>
      </div>
    </div>
  </main>

</body>
</html>
